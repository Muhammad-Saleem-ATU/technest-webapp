<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="1200" height="700" fill="white"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1F1F1F">TechNest – Class Diagram</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- PRODUCT CLASS  (x=40) -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Header -->
  <rect x="40" y="60" width="290" height="50" fill="#B8D4E8" stroke="#5B9BD5" stroke-width="2" rx="2"/>
  <text x="185" y="80" text-anchor="middle" font-size="11" fill="#1F1F1F">«class»</text>
  <text x="185" y="98" text-anchor="middle" font-size="14" font-weight="bold" fill="#1F1F1F">Product</text>

  <!-- Properties section -->
  <rect x="40" y="110" width="290" height="122" fill="white" stroke="#5B9BD5" stroke-width="2"/>
  <text x="55" y="130" font-size="12" fill="#1F1F1F">+ id : String</text>
  <text x="55" y="148" font-size="12" fill="#1F1F1F">+ name : String</text>
  <text x="55" y="166" font-size="12" fill="#1F1F1F">+ price : Number</text>
  <text x="55" y="184" font-size="12" fill="#1F1F1F">+ category : String</text>
  <text x="55" y="202" font-size="12" fill="#1F1F1F">+ description : String</text>
  <text x="55" y="220" font-size="12" fill="#1F1F1F">+ image : String</text>

  <!-- Methods section -->
  <rect x="40" y="232" width="290" height="72" fill="white" stroke="#5B9BD5" stroke-width="2"/>
  <line x1="40" y1="232" x2="330" y2="232" stroke="#A0A0A0" stroke-width="1"/>
  <text x="55" y="252" font-size="12" fill="#1F1F1F">+ constructor(id, name, price,</text>
  <text x="65" y="270" font-size="12" fill="#1F1F1F">category, description, image)</text>
  <text x="55" y="290" font-size="12" fill="#1F1F1F">+ getSummary() : String</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- BASKET CLASS  (x=420) -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Header -->
  <rect x="420" y="60" width="300" height="50" fill="#B8D4E8" stroke="#5B9BD5" stroke-width="2" rx="2"/>
  <text x="570" y="80" text-anchor="middle" font-size="11" fill="#1F1F1F">«class»</text>
  <text x="570" y="98" text-anchor="middle" font-size="14" font-weight="bold" fill="#1F1F1F">Basket</text>

  <!-- Properties section -->
  <rect x="420" y="110" width="300" height="36" fill="white" stroke="#5B9BD5" stroke-width="2"/>
  <text x="435" y="132" font-size="12" fill="#1F1F1F">+ items : Array</text>

  <!-- Methods section -->
  <rect x="420" y="146" width="300" height="196" fill="white" stroke="#5B9BD5" stroke-width="2"/>
  <line x1="420" y1="146" x2="720" y2="146" stroke="#A0A0A0" stroke-width="1"/>
  <text x="435" y="166" font-size="12" fill="#1F1F1F">+ constructor()</text>
  <text x="435" y="184" font-size="12" fill="#1F1F1F">+ addItem(product, qty) : void</text>
  <text x="435" y="202" font-size="12" fill="#1F1F1F">+ updateQty(productId, qty) : void</text>
  <text x="435" y="220" font-size="12" fill="#1F1F1F">+ removeItem(productId) : void</text>
  <text x="435" y="238" font-size="12" fill="#1F1F1F">+ getTotal() : Number</text>
  <text x="435" y="256" font-size="12" fill="#1F1F1F">+ getCount() : Number</text>
  <text x="435" y="274" font-size="12" fill="#1F1F1F">+ clear() : void</text>
  <text x="435" y="292" font-size="12" fill="#1F1F1F">+ loadFromStorage() : void</text>
  <text x="435" y="310" font-size="12" fill="#1F1F1F">+ saveToStorage() : void</text>
  <text x="435" y="328" font-size="12" fill="#1F1F1F">+ isEmpty() : Boolean</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STORAGEMANAGER CLASS  (x=820) -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Header -->
  <rect x="820" y="60" width="300" height="50" fill="#B8D4E8" stroke="#5B9BD5" stroke-width="2" rx="2"/>
  <text x="970" y="80" text-anchor="middle" font-size="11" fill="#1F1F1F">«class»</text>
  <text x="970" y="98" text-anchor="middle" font-size="14" font-weight="bold" fill="#1F1F1F">StorageManager</text>

  <!-- Properties section -->
  <rect x="820" y="110" width="300" height="36" fill="white" stroke="#5B9BD5" stroke-width="2"/>
  <text x="835" y="132" font-size="12" fill="#1F1F1F">+ KEY : String</text>

  <!-- Methods section -->
  <rect x="820" y="146" width="300" height="108" fill="white" stroke="#5B9BD5" stroke-width="2"/>
  <line x1="820" y1="146" x2="1120" y2="146" stroke="#A0A0A0" stroke-width="1"/>
  <text x="835" y="166" font-size="12" fill="#1F1F1F">+ constructor(key)</text>
  <text x="835" y="184" font-size="12" fill="#1F1F1F">+ save(data) : void</text>
  <text x="835" y="202" font-size="12" fill="#1F1F1F">+ load() : Array</text>
  <text x="835" y="220" font-size="12" fill="#1F1F1F">+ clear() : void</text>
  <text x="835" y="238" font-size="12" fill="#1F1F1F">+ exists() : Boolean</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- PAGE SCRIPTS NOTE BOX -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="430" y="540" width="240" height="56" fill="#FFF2CC" stroke="#C0A000" stroke-width="2" rx="3"/>
  <text x="550" y="562" text-anchor="middle" font-size="12" fill="#1F1F1F">Page Scripts</text>
  <text x="550" y="580" text-anchor="middle" font-size="11" fill="#555">(products.js, basket.js, checkout.js)</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ARROWS -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Arrowhead marker - filled -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5B9BD5"/>
    </marker>
  </defs>

  <!-- Product → Basket  "stored in"  (solid association) -->
  <line x1="330" y1="160" x2="418" y2="160" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="374" y="150" text-anchor="middle" font-size="11" fill="#444">stored in</text>

  <!-- Basket → StorageManager  "uses"  (dashed dependency) -->
  <line x1="720" y1="200" x2="818" y2="200" stroke="#555555" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="769" y="190" text-anchor="middle" font-size="11" fill="#444">uses</text>

  <!-- Page Scripts → Product  (dashed, reads) -->
  <line x1="470" y1="540" x2="200" y2="306" stroke="#555555" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="305" y="440" text-anchor="middle" font-size="11" fill="#444" transform="rotate(-35, 305, 440)">reads</text>

  <!-- Page Scripts → Basket  (dashed, interacts) -->
  <line x1="560" y1="540" x2="570" y2="344" stroke="#555555" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="590" y="450" font-size="11" fill="#444">interacts</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LEGEND -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <text x="40" y="640" font-size="13" font-weight="bold" fill="#1F1F1F">Legend:</text>

  <!-- solid arrow -->
  <line x1="110" y1="636" x2="160" y2="636" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="168" y="640" font-size="11" fill="#444">Association</text>

  <!-- dashed arrow -->
  <line x1="280" y1="636" x2="330" y2="636" stroke="#555" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="338" y="640" font-size="11" fill="#444">Dependency (uses / reads)</text>

  <!-- Note box swatch -->
  <rect x="530" y="626" width="22" height="16" fill="#FFF2CC" stroke="#C0A000" stroke-width="1.5"/>
  <text x="558" y="640" font-size="11" fill="#444">Note / external component</text>

</svg>
