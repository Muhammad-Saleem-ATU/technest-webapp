name: CI/CD Pipeline

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # HTML validation
      - name: Validate HTML
        run: |
          npm install -g htmlhint
          htmlhint --config .htmlhintrc "**/*.html"

      # CSS linting
      - name: Lint CSS
        run: |
          npm install -g stylelint stylelint-config-standard
          stylelint "**/*.css" || true

      # JavaScript linting
      - name: Lint JavaScript
        run: |
          npm install -g eslint          
          eslint "**/*.js" || true
       
      # DevSecOps – security scanning
      - name: Run security audit
        run: |
          if [ -f package.json ]; then
            npm audit --audit-level=moderate || true
          else
            echo "No package.json found, skipping dependency audit"
          fi

  build:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Create build folder and copy files
      - name: Build project
        run: |
          mkdir build
          cp -r *.html css js assets icons build/ 2>/dev/null || true

      # Archive build output
      - name: Archive build
        run: zip -r technest-build.zip build

      # Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: technest-build
          path: technest-build.zip

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy
        run: echo "Deploying to GitHub Pages..."
