<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechNest - Product Detail</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">TechNest</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="products.html">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="basket.html">
                            Basket
                            <span class="badge bg-danger ms-1" id="basket-count">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="py-5">
        <div class="container">

            <!-- Back Link -->
            <a href="products.html" class="text-decoration-none text-dark mb-4 d-inline-block">
                &larr; Back to Products
            </a>

            <!-- Product Detail Layout -->
            <div class="row mt-3" id="product-detail">

                <!-- Left Column - Product Image -->
                <div class="col-md-5">
                    <img
                        src=""
                        alt="Product Image"
                        class="img-fluid"
                        id="product-image">
                    <!-- image will be set by JavaScript in week 6 -->
                </div>

                <!-- Right Column - Product Info -->
                <div class="col-md-7">
                    <h2 id="product-name">Product Name</h2>
                    <span class="badge bg-secondary mb-3" id="product-category">Category</span>
                    <p id="product-description">Product description will appear here.</p>
                    <h4 class="fw-bold" id="product-price">€0.00</h4>

                    <!-- Quantity and Add to Basket -->
                    <div class="mt-4">
                        <label for="quantity" class="form-label">Quantity</label>
                        <input
                            type="number"
                            class="form-control w-25"
                            id="quantity"
                            value="1"
                            min="1">
                    </div>

                    <button class="btn btn-dark mt-3" id="add-to-basket-btn">
                        Add to Basket
                    </button>
                </div>

            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <div class="container">
            <p class="mb-0">TechNest &mdash; Muhammad Saleem &mdash; L00196822 &mdash; ATU</p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Page JS will be added in week 6 -->

</body>
</html>
